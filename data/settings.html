<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>v1g2.display · Configuration</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script src="settings.js"></script>
    <nav>
        <span class="nav-brand">v1g2</span>
        <a href="/">Home</a>
        <a href="#" class="active">Configuration</a>
        <a href="lockouts.html">Lockouts</a>
        <a href="status.html">Status</a>
        <a href="logs.html">Logs</a>
        <a href="update.html">Update</a>
    </nav>

    <form id="settingsForm">

        <!-- Display -->
        <div class="card">
            <div class="card-title">Display</div>
            <div class="form-grid">
                <div class="field">
                    <label for="brightness">Screen Brightness</label>
                    <input type="text" id="brightness" name="brightness">
                </div>
                <div class="field">
                    <label for="displayOrientation">Screen Orientation</label>
                    <select id="displayOrientation" name="displayOrientation">
                        <option value="0">Landscape (default — plug on bottom)</option>
                        <option value="1">Portrait (plug to left)</option>
                        <option value="2">Landscape Inverted (plug on top)</option>
                        <option value="3">Portrait Inverted (plug to right)</option>
                    </select>
                </div>
                <div class="field">
                    <label for="colorPicker">Text Color</label>
                    <input type="color" id="colorPicker" name="textColor" value="#ff0000">
                    <span id="textColor-current" style="font-size:11px; color:var(--text-muted); margin-top:2px;">#ff0000</span>
                </div>
                <div class="field">
                    <label for="useDefaultV1Mode">Use Default V1 Mode Display</label>
                    <select id="useDefaultV1Mode" name="useDefaultV1Mode">
                        <option value="true">Yes</option>
                        <option value="false">No</option>
                    </select>
                </div>
                <div class="field">
                    <label for="turnOffDisplay">Turn Off V1 Display</label>
                    <select id="turnOffDisplay" name="turnOffDisplay">
                        <option value="false">No</option>
                        <option value="true">Yes</option>
                    </select>
                </div>
                <div class="field">
                    <label for="onlyDisplayBTIcon">Show BT Icon if V1 Display is Off</label>
                    <select id="onlyDisplayBTIcon" name="onlyDisplayBTIcon">
                        <option value="false">No</option>
                        <option value="true">Yes</option>
                    </select>
                </div>
                <div class="field">
                    <label for="displayTest">Display Test</label>
                    <select id="displayTest" name="displayTest">
                        <option value="false">Disabled</option>
                        <option value="true">Enabled</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Alerts -->
        <div class="card">
            <div class="card-title">Alerts</div>
            <div class="form-grid">
                <div class="field">
                    <label for="muteToGray">Gray Muted / Locked-out Alerts</label>
                    <select id="muteToGray" name="muteToGray">
                        <option value="true">Yes</option>
                        <option value="false">No</option>
                    </select>
                </div>
                <div class="field">
                    <label for="colorBars">Color-coded Signal Strength Bars</label>
                    <select id="colorBars" name="colorBars">
                        <option value="true">Yes</option>
                        <option value="false">No</option>
                    </select>
                </div>
                <div class="field">
                    <label for="showBogeys">Show Bogey Counter</label>
                    <select id="showBogeys" name="showBogeys">
                        <option value="true">Yes</option>
                        <option value="false">No</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Connectivity -->
        <div class="card">
            <div class="card-title">Connectivity</div>
            <div class="form-grid">
                <div class="field">
                    <label for="wifiMode">Wi-Fi Mode</label>
                    <select id="wifiMode" name="wifiMode">
                        <option value="1">Client</option>
                        <option value="2">Access Point</option>
                    </select>
                </div>
                <div class="field">
                    <label for="localSSID">Local SSID</label>
                    <input type="text" id="localSSID" name="localSSID">
                </div>
                <div class="field">
                    <label for="localPW">Local Wi-Fi Password</label>
                    <input type="password" id="localPW" name="localPW">
                </div>
                <div class="field">
                    <label for="disableBLE">Bluetooth</label>
                    <select id="disableBLE" name="disableBLE">
                        <option value="false">Enabled</option>
                        <option value="true">Disabled</option>
                    </select>
                </div>
                <div class="field">
                    <label for="proxyBLE">Proxy BLE for JBV1</label>
                    <select id="proxyBLE" name="proxyBLE">
                        <option value="true">Enabled</option>
                        <option value="false">Disabled</option>
                    </select>
                </div>
                <div class="field">
                    <label for="useV1LE">Use V1C LE</label>
                    <select id="useV1LE" name="useV1LE">
                        <option value="false">No</option>
                        <option value="true">Yes</option>
                    </select>
                </div>
                <div class="field full-width">
                    <label>Wi-Fi Networks</label>
                    <div id="wifiCredentialsContainer"></div>
                    <button type="button" onclick="addWifiCredential()" style="margin-top:8px; width:fit-content;">+ Add Network</button>
                </div>
            </div>
        </div>

        <!-- GPS & Units -->
        <div class="card">
            <div class="card-title">GPS &amp; Units</div>
            <div class="form-grid">
                <div class="field">
                    <label for="timezone">Timezone</label>
                    <select id="timezone" name="timezone">
                        <option value="UTC">UTC (Coordinated Universal Time)</option>
                        <option value="America/New_York">EST (New York)</option>
                        <option value="America/Chicago">CST (Chicago)</option>
                        <option value="America/Denver">MST (Denver)</option>
                        <option value="America/Los_Angeles">PST (Los Angeles)</option>
                        <option value="America/Anchorage">AKST (Alaska)</option>
                        <option value="Pacific/Honolulu">HST (Hawaii)</option>
                    </select>
                </div>
                <div class="field">
                    <label for="enableGPS">GPS</label>
                    <select id="enableGPS" name="enableGPS">
                        <option value="true">Enabled</option>
                        <option value="false">Disabled</option>
                    </select>
                </div>
                <div class="field">
                    <label for="unitSystem">Unit System</label>
                    <select id="unitSystem" name="unitSystem">
                        <option value="Imperial">Imperial</option>
                        <option value="Metric">Metric</option>
                    </select>
                </div>
                <div class="field">
                    <label for="lowSpeedThreshold">Low Speed Threshold</label>
                    <select id="lowSpeedThreshold" name="lowSpeedThreshold">
                        <option value="20">20</option>
                        <option value="25">25</option>
                        <option value="30">30</option>
                        <option value="35">35</option>
                        <option value="40">40</option>
                        <option value="45">45</option>
                        <option value="50">50</option>
                        <option value="55">55</option>
                        <option value="60">60</option>
                    </select>
                </div>
            </div>
        </div>

        <input type="submit" value="Save Changes">

    </form>
</body>
</html>
